services:
  redis:
    image: redis:7-alpine
    container_name: mammon-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - mammon-redis-data:/data

  timescale:
    image: timescale/timescaledb:latest-pg14
    container_name: mammon-timescale
    environment:
      - POSTGRES_DB=mammon_audit
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "55432:5432"
    restart: unless-stopped
    volumes:
      - mammon-timescale-data:/var/lib/postgresql/data

  dashboard:
    build: .
    container_name: mammon-dashboard
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - TIMESCALE_HOST=timescale
      - TIMESCALE_PORT=5432
    depends_on:
      - redis
      - timescale
    volumes:
      # Mount the full engine — live code edits, vault, DBs all accessible
      - .:/mammon
    restart: unless-stopped

  mcp:
    build: ./mcp_server
    container_name: mammon-mcp
    ports:
      - "5001:5001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAMMON_BASE=/mammon
      - MCP_PORT=5001
    depends_on:
      - redis
    volumes:
      # Same mount as dashboard — reads all SQLite/DuckDB files directly
      - .:/mammon
    restart: unless-stopped

volumes:
  mammon-redis-data:
  mammon-timescale-data:
